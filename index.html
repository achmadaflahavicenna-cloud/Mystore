<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <title>Maru Store</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      text-align: center;
      color: white;

      /* GRADASI KUNING HITAM */
      background: linear-gradient(135deg, black, #1a1a1a, gold);
      height: 100vh;
    }

    .container {
      margin-top: 100px;
    }

    button {
      padding: 15px 30px;
      font-size: 18px;
      background: gold;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      font-weight: bold;
      transition: 0.3s;
    }

    button:hover {
      background: orange;
      transform: scale(1.1);
    }

    #content {
      display: none;
      margin-top: 30px;
      animation: fadeIn 1s ease;
    }

    img {
      max-width: 80%;
      border-radius: 15px;
      box-shadow: 0 0 25px gold;
    }

    h1 {
      color: gold;
      margin-top: 20px;
      text-shadow: 0 0 10px black;
    }

    p {
      font-size: 18px;
      text-shadow: 0 0 5px black;
    }

    /* ANIMASI MUNCUL */
    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: translateY(20px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }
  </style>
</head>
<body>

  <div class="container">
    <button onclick="showContent()">Klik Disini</button>

    <div id="content">
      <img src="maru.jpg" alt="Channa Maru">
      <h1>Selamat Datang di Maru Store</h1>
      <p>Kami menjual Channa Maru ber grade tinggi 🔥</p>
    </div>
  </div>

  <script>
    function showContent() {
      document.getElementById("content").style.display = "block";
    }
  </script>

</body>
</html>
